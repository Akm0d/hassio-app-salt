---
name: Salt
version: "0.13.0"
slug: salt
description: Run a Salt master with admin-only SaltGUI ingress and host-editable state trees
url: https://github.com/Akm0d/hassio-app-salt
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:shaker-outline
panel_title: Salt
panel_admin: true
arch:
  - aarch64
  - amd64
map:
  - type: share
    read_only: false
    path: /srv
ports:
  4505/tcp: 4505
  4506/tcp: 4506
ports_description:
  4505/tcp: Salt publish port
  4506/tcp: Salt return port
options:
  log_level: info
  gui_password: ""
  auto_accept: false
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
  gui_password: password
  auto_accept: bool
